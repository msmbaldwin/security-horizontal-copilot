# ============================================================================
# CRITICAL VIOLATIONS
# ============================================================================

critical_violations:

  - id: AUDIT-CRIT-001
    rule_violated: VNET-BASTION-002
    severity: critical
    article: tutorial-filter-network-traffic.md
    description: "VMs created with public IP addresses; no Azure Bastion deployment"
    evidence:
      - line: 504
        content: "Public IP | Leave the default of a new public IP"
      - line: 527
        content: "Create a public IP address for each VM with New-AzPublicIpAddress"
      - line: 841
        content: "browse to http://<public-ip-address-from-previous-step>"
    impact: "Users learn insecure pattern of exposing VMs directly to internet"
    recommended_fix: |
      1. Add Azure Bastion deployment section (like other tutorials)
      2. Remove public IP from VMs
      3. Change testing instructions to use Bastion for SSH access
      4. Keep web server testing via Application Gateway or load balancer public IP
    work_item_priority: P1

